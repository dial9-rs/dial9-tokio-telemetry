name: Trace Viewer E2E
on:
  pull_request:
    paths:
      - "dial9-trace-format/**"
      - "dial9-trace-format-derive/**"
      - "dial9-tokio-telemetry/trace_viewer/**"
      - "dial9-tokio-telemetry/src/telemetry/events.rs"
      - "dial9-tokio-telemetry/src/telemetry/format.rs"
      - ".github/workflows/e2e-trace-viewer.yml"
  merge_group:

permissions:
  contents: read

jobs:
  trace-viewer-e2e:
    name: Trace Viewer E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: dial9-tokio-telemetry/trace_viewer/package-lock.json
      - name: Install dependencies
        working-directory: dial9-tokio-telemetry/trace_viewer
        run: npm ci
      - name: Install Playwright Chromium
        working-directory: dial9-tokio-telemetry/trace_viewer
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        working-directory: dial9-tokio-telemetry/trace_viewer
        run: npx playwright test
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: dial9-tokio-telemetry/trace_viewer/playwright-report/
